# Credentials for `kotlin publish github` (GitHub Packages).
#
# This file is TRACKED with PLACEHOLDER values on purpose: the Kotlin Toolchain requires it to exist
# to load the project model, otherwise `./kotlin build` and `./kotlin test` fail — not just `publish`.
#
# ⚠️ NEVER commit a real token here. Two safe ways to provide real credentials:
#
#   • Local publishing: put your real values below, then tell git to ignore your local changes:
#         git update-index --skip-worktree creds.properties
#     (undo later with: git update-index --no-skip-worktree creds.properties)
#
#   • CI (TeamCity): overwrite this file from a secret parameter right before `kotlin publish github`
#     — the ephemeral checkout is never committed back.
#
# `password` is a GitHub Personal Access Token with the `write:packages` (and `read:packages`) scope.
username=CHANGE_ME
password=CHANGE_ME
